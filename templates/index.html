<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Fund Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f2f2f2;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #0f4c75;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .submit-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #0f4c75;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #3282b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 Emergency Fund Calculator</h1>

    <form action="/calculate" method="post">

        <label>Enter your Salary (₹):</label>
        <input type="number" name="salary" step="any" required>

        <label>Enter Monthly Expenses (₹):</label>

        <input type="number" name="Rent" placeholder="Rent" step="any" value="0">
        <input type="number" name="Utilities" placeholder="Utilities" step="any" value="0">
        <input type="number" name="Groceries" placeholder="Groceries" step="any" value="0">
        <input type="number" name="Transport" placeholder="Transport" step="any" value="0">
        <input type="number" name="Insurance" placeholder="Insurance" step="any" value="0">
        <input type="number" name="Other" placeholder="Other" step="any" value="0">

        <label>How many months do you want to save for?</label>
        <input type="number" name="months" min="1" max="24" value="6">

        <button class="submit-btn" type="submit">Calculate</button>

    </form>
</div>

</body>
</html>
