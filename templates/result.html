<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 30px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        h1 {
            color: #0f4c75;
        }
        .btn {
            display: block;
            margin-top: 25px;
            padding: 12px;
            background: #0f4c75;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💰 Emergency Fund Result</h1>

    <p><b>Salary:</b> ₹{{ salary }}</p>
    <p><b>Total Monthly Expenses:</b> ₹{{ total_monthly_expenses }}</p>
    <p><b>Months:</b> {{ months }}</p>
    <h2>Total Emergency Fund Needed: ₹{{ emergency_fund }}</h2>

    <a class="btn" href="/">← Back to Calculator</a>
</div>

</body>
</html>
